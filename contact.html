<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hey Fitty - Contact</title>
  <link rel="stylesheet" href="styling.css">
</head>
<body>

  <header>
    <h1>Hey Fitty</h1>
    <nav>
      <a href="home.html">Home</a>
      <a href="workouts.html">Workouts</a>
      <a href="nutrition.html">Nutrition</a>
      <a href="blog.html">Blog</a>
      <a href="about.html">About Us</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <div class="hero">
    <h2>Contact Us</h2>
    <p>We'd love to hear from you!</p>
  </div>

  <main>

    <div class="section">
      <h2>Send Us a Message</h2>
      <form class="contact-form" action="https://wp.zybooks.com/form-viewer.php" method="POST">
        <label for="name">Full Name *</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email Address *</label>
        <input type="email" id="email" name="email" required>

        <label for="subject">Subject</label>
        <select id="subject" name="subject">
          <option value="">Select a topic...</option>
          <option value="general">General Question</option>
          <option value="workout">Workout Question</option>
          <option value="nutrition">Nutrition Question</option>
          <option value="feedback">Feedback</option>
        </select>

        <label for="message">Message *</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <br><br>
        <input type="submit" value="Send Message" class="btn">
      </form>
    </div>

    <div class="section">
      <h2>Find Us</h2>
      <p>Email: <a href="mailto:hello@heyfitty.com">hello@heyfitty.com</a></p>
    </div>

  </main>

  <footer>
    <p>Hey Fitty &copy; 2026 | Made by Karyna &amp; Raniya</p>
    <a href="contact.html">Contact</a>
  </footer>

</body>
</html>
